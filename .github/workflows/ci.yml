name: ci
on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '*.txt']
  pull_request:
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '*.txt']
jobs:
  unit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - run: go vet ./...
      - run: go test ./...
  pins:
    # Re-derive the pinned sing-box SHA-256 from the upstream release and diff it
    # against the hand-maintained pin in install.sh, so a wrong or stale hash
    # cannot slip in unnoticed on a version bump. (F-6; nfqws2 already derives its
    # hash from upstream at install time, so it needs no check here.)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: sing-box pin matches upstream
        run: |
          set -euo pipefail
          ver="$(grep -oP 'SINGBOX_VERSION="\K[^"]+' install.sh | head -1)"
          [ -n "$ver" ] || { echo "could not read SINGBOX_VERSION from install.sh"; exit 1; }
          echo "pinned sing-box version: $ver"
          for arch in amd64 arm64; do
            pinned="$(grep -oP "${arch}\) SINGBOX_SHA256=\"\K[0-9a-f]+" install.sh)"
            [ -n "$pinned" ] || { echo "no pinned SHA for $arch in install.sh"; exit 1; }
            url="https://github.com/SagerNet/sing-box/releases/download/v${ver}/sing-box-${ver}-linux-${arch}.tar.gz"
            curl -fsSL --retry 4 --retry-delay 3 --connect-timeout 20 "$url" -o sb.tgz
            got="$(sha256sum sb.tgz | cut -d' ' -f1)"
            if [ "$got" != "$pinned" ]; then
              echo "::error::sing-box $arch pin mismatch — install.sh has $pinned, upstream is $got"
              exit 1
            fi
            echo "$arch OK ($got)"
          done
  shell:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck install.sh + test scripts
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y shellcheck
          for f in install.sh test/update-smoke.sh; do
            if [ -f "$f" ]; then
              echo "== shellcheck $f =="
              shellcheck "$f"
              bash -n "$f"
            fi
          done
  release-dryrun:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - name: Build both arches (no publish)
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X github.com/KoRORland/rdda/internal/cli.Version=v0.0.0-dryrun"
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" \
              go build -ldflags "$LDFLAGS" -o "/tmp/rdda-${arch}" ./cmd/rdda
          done
          test "$(/tmp/rdda-amd64 version)" = "v0.0.0-dryrun"
