name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  # Run the full heavy integration suite as a pre-publish gate on every v* tag.
  integration:
    uses: ./.github/workflows/integration.yml
  build:
    needs: integration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - name: Build binaries
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X github.com/KoRORland/rdda/internal/cli.Version=${TAG}"
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" \
              go build -ldflags "$LDFLAGS" -o "dist/rdda-linux-${arch}" ./cmd/rdda
          done
          cd dist && sha256sum rdda-linux-amd64 rdda-linux-arm64 > SHA256SUMS
      - name: Verify amd64 version string
        run: |
          set -euo pipefail
          # amd64 binary runs on the amd64 runner; confirm the tag was stamped in.
          out="$(./dist/rdda-linux-amd64 version)"
          echo "version output: $out"
          test "$out" = "${GITHUB_REF_NAME}"
      - name: Sign SHA256SUMS (minisign)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          test -n "$MINISIGN_SECRET_KEY" || { echo "MINISIGN_SECRET_KEY secret is not set"; exit 1; }
          sudo apt-get update && sudo apt-get install -y minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > /tmp/minisign.key
          minisign -S -s /tmp/minisign.key -m dist/SHA256SUMS \
            -t "rdda ${GITHUB_REF_NAME}" -c "rdda release signature" </dev/null
          shred -u /tmp/minisign.key
          # Self-verify against the public key embedded in the binary, so a
          # key/secret mismatch fails the release instead of publishing an
          # asset that no deployed client can verify.
          PUB="$(tail -n1 internal/verify/minisign.pub)"
          case "$PUB" in
            *PLACEHOLDER-UNSIGNED*) echo "internal/verify/minisign.pub is still the placeholder — embed the real key before releasing"; exit 1;;
          esac
          minisign -Vm dist/SHA256SUMS -P "$PUB" -x dist/SHA256SUMS.minisig
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/rdda-linux-amd64
            dist/rdda-linux-arm64
            dist/SHA256SUMS
            dist/SHA256SUMS.minisig

  # Post-publish: prove a user on the PREVIOUS release can `rdda update` to this
  # one, against the real published assets. Exercises the download+retry,
  # checksum, atomic swap, version self-check, "restart only an existing unit"
  # (a bare runner has no rdda-sub — the RU-node shape), and rollback paths.
  update-smoke:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: install previous release, then rdda update to this tag
        run: sudo test/update-smoke.sh "${GITHUB_REF_NAME}" amd64
